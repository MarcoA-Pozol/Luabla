version: '3.9'

services:
  luabla:
    build: .
    command: sh -c "python manage.py migrate --noinput && python manage.py collectstatic --noinput && python manage.py runserver 0.0.0.0:8700"
    volumes:
      - .:/code/Luabla
    ports:
      - "8700:8700"
    depends_on:
      - luabla_db  # Changed from Luabla_DB to luabla_db
    environment:
      - DEBUG=1
      - DB_NAME=Luabla_DB
      - DB_USER=postgres
      - DB_PASSWORD=mach1029
      - DB_HOST=luabla_db
      - DB_PORT=5432

  luabla_db:
    image: postgres:13
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "8701:5432"
    environment:
      POSTGRES_DB: Luabla_DB
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mach1029

volumes:
  postgres_data:
